<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>春日山海之旅</title>

  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="生日旅行" />
  <meta name="theme-color" id="theme-color-meta" content="#3776ab" />

  <script>
    (function () {
      const THEME_MODE_KEY = "theme-mode";
      const savedMode = localStorage.getItem(THEME_MODE_KEY) || "system";
      const prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      const resolvedTheme =
        savedMode === "system" ? (prefersDark ? "dark" : "light") : savedMode;

      document.documentElement.setAttribute("data-theme-mode", savedMode);
      document.documentElement.setAttribute("data-theme", resolvedTheme);
      document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
      document.documentElement.classList.toggle("light", resolvedTheme === "light");
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            fuji: { 500: "#3776ab", 600: "#2c5e8a" },
            sakura: { 50: "#fff5f7", 100: "#ffe4e1", 500: "#ffb7c5" }
          }
        }
      }
    };
  </script>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --surface: #fafafa;
      --surface-2: #ffffff;
      --surface-3: #f9fafb;
      --text: #111827;
      --text-soft: #6b7280;
      --border: #e5e7eb;
      --line: #e5e7eb;
      --header-bg: #3776ab;
      --header-text: #ffffff;
      --accent: #ffb7c5;
      --accent-soft: #fff5f7;
      --accent-border: #ffe4e1;
      --shadow: 0 0 25px rgba(0, 0, 0, 0.10);
      --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      --nav-top: 0px;
      --theme-btn-bg: rgba(255, 255, 255, 0.12);
      --theme-btn-hover: rgba(255, 255, 255, 0.20);
      --header-panel-bg: rgba(255, 255, 255, 0.14);
      --header-panel-border: rgba(255, 255, 255, 0.12);
    }

    html[data-theme="dark"] {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --surface-3: #111827;
      --text: #f3f4f6;
      --text-soft: #9ca3af;
      --border: #374151;
      --line: #334155;
      --header-bg: #1e3a5f;
      --header-text: #f9fafb;
      --accent: #f49bb1;
      --accent-soft: rgba(244, 155, 177, 0.12);
      --accent-border: rgba(244, 155, 177, 0.18);
      --shadow: 0 0 25px rgba(0, 0, 0, 0.32);
      --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      --theme-btn-bg: rgba(255, 255, 255, 0.08);
      --theme-btn-hover: rgba(255, 255, 255, 0.14);
      --header-panel-bg: rgba(255, 255, 255, 0.08);
      --header-panel-border: rgba(255, 255, 255, 0.10);
    }

    html.dark {
      color-scheme: dark;
    }

    html.light {
      color-scheme: light;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .app-container {
      max-width: 100%;
      min-height: 100vh;
      background-color: var(--surface);
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      transition: background-color 0.25s ease;
    }

    @media (min-width: 640px) {
      .app-container {
        max-width: 500px;
        box-shadow: var(--shadow);
      }
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .timeline-line {
      position: absolute;
      left: 1.5rem;
      top: 2rem;
      bottom: 0;
      width: 2px;
      background-color: var(--line);
      z-index: 0;
      transition: background-color 0.25s ease;
    }

    .header-shell {
      background-color: var(--header-bg);
      color: var(--header-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .surface-card {
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      transition:
        background-color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
    }

    .top-nav {
      position: sticky;
      top: var(--nav-top);
      z-index: 20;
      background-color: var(--surface-2);
      border-bottom: 1px solid var(--border);
      transition: background-color 0.25s ease, border-color 0.25s ease, top 0.2s ease;
    }

    .quick-link {
      background: rgba(255, 255, 255, 0.10);
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .quick-link:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .quick-link:active {
      transform: scale(0.98);
    }

    .theme-chip {
      background: var(--theme-btn-bg);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .theme-chip:hover {
      background: var(--theme-btn-hover);
    }

    .theme-chip:active {
      transform: scale(0.98);
    }

    .header-weather {
      background: var(--header-panel-bg);
      border: 1px solid var(--header-panel-border);
      backdrop-filter: blur(8px);
    }

    .day-tab {
      transition: all 0.25s ease;
    }

    .day-tab.active {
      background-color: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transform: scale(1.04);
    }

    .day-tab.inactive {
      background-color: var(--surface-2);
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    .day-tab.inactive:hover {
      background-color: var(--accent-soft);
      border-color: var(--accent-border);
    }

    .time-pill {
      background-color: var(--accent-soft);
      border: 1px solid var(--accent-border);
    }

    .event-actions {
      border-top: 1px solid var(--border);
      background-color: var(--surface-3);
    }

    .event-actions a + a {
      border-left: 1px solid var(--border);
    }

    .text-soft {
      color: var(--text-soft);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

  <script>
    const tripData = [

        ]
      },

          { time: "11:00", title: "三島車站 (還車)", location: "三島車站", weatherQuery: "Mishima Station, Shizuoka, Japan" },
          { time: "12:30", title: "MOA 美術館", location: "MOA 美術館", weatherQuery: "MOA Museum of Art, Atami, Japan" },
          { time: "15:30", title: "La Vista Atami Terrace", location: "La Vista Atami Terrace ラビスタ熱海テラス", weatherQuery: "La Vista Atami Terrace, Atami, Japan" }
        ]
      },
      {
        dayLabel: "Day 4",
        date: "3/24",
        title: "觀光列車與東京",
        events: [
          { time: "10:30", title: "熱海陽光沙灘", location: "熱海陽光沙灘", weatherQuery: "Atami Sun Beach, Atami, Japan" },
          { time: "15:31", title: "藍寶石踊子號 (熱海站)", location: "熱海站", weatherQuery: "Atami Station, Shizuoka, Japan" },
          { time: "17:30", title: "fav TOKYO NISHINIPPORI", location: "fav TOKYO NISHINIPPORI", weatherQuery: "fav TOKYO NISHINIPPORI, Tokyo, Japan" },
          { time: "19:00", title: "千鳥之淵 或 目黑川", location: "千鳥之淵 或 目黑川", weatherQuery: "Chidorigafuchi, Tokyo, Japan" }
        ]
      },
      {
        dayLabel: "Day 5",
        date: "3/25",
        title: "早櫻與返台",
        events: [
          { time: "09:30", title: "新宿御苑 或 上野恩賜公園", location: "新宿御苑", weatherQuery: "Shinjuku Gyoen, Tokyo, Japan" },
          { time: "12:00", title: "阿美橫丁", location: "阿美橫丁", weatherQuery: "Ameyoko, Tokyo, Japan" },
          { time: "15:00", title: "日暮里站 (搭乘 Keisei Skyliner)", location: "日暮里站", weatherQuery: "Nippori Station, Tokyo, Japan" },
          { time: "18:00", title: "成田機場 (日航 JL809)", location: "成田國際機場", weatherQuery: "Narita International Airport, Chiba, Japan" }
        ]
      }
    ];

    let currentDayIndex = 0;
    const THEME_MODE_KEY = "theme-mode";
    const themeMedia = window.matchMedia("(prefers-color-scheme: dark)");
    const geocodeCache = new Map();

    const tabContainer = document.getElementById("tab-container");
    const itineraryContainer = document.getElementById("itinerary-container");
    const themeToggleBtn = document.getElementById("theme-toggle-btn");
    const themeToggleText = document.getElementById("theme-toggle-text");
    const themeToggleIcon = document.getElementById("theme-toggle-icon");
    const themeColorMeta = document.getElementById("theme-color-meta");
    const gmailBtn = document.getElementById("gmail-app-btn");
    const appHeader = document.getElementById("app-header");

    const weatherEls = {
      source: document.getElementById("weather-source"),
      location: document.getElementById("weather-location"),
      summary: document.getElementById("weather-summary"),
      icon: document.getElementById("weather-icon"),
      temp: document.getElementById("weather-temp"),
      range: document.getElementById("weather-range")
    };

    function getSavedThemeMode() {
      return localStorage.getItem(THEME_MODE_KEY) || "system";
    }

    function resolveTheme(mode) {
      return mode === "system" ? (themeMedia.matches ? "dark" : "light") : mode;
    }

    function nextThemeMode(mode) {
      if (mode === "system") return "dark";
      if (mode === "dark") return "light";
      return "system";
    }

    function updateThemeButton(mode) {
      if (mode === "system") {
        themeToggleIcon.textContent = "🌓";
        themeToggleText.textContent = "系統";
      } else if (mode === "dark") {
        themeToggleIcon.textContent = "🌙";
        themeToggleText.textContent = "暗色";
      } else {
        themeToggleIcon.textContent = "☀️";
        themeToggleText.textContent = "亮色";
      }
    }

    function applyThemeMode(mode) {
      const resolved = resolveTheme(mode);

      document.documentElement.setAttribute("data-theme-mode", mode);
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.classList.toggle("dark", resolved === "dark");
      document.documentElement.classList.toggle("light", resolved === "light");

      themeColorMeta.setAttribute("content", resolved === "dark" ? "#1e3a5f" : "#3776ab");
      updateThemeButton(mode);
    }

    function initTheme() {
      applyThemeMode(getSavedThemeMode());

      themeToggleBtn.addEventListener("click", () => {
        const currentMode = getSavedThemeMode();
        const newMode = nextThemeMode(currentMode);
        localStorage.setItem(THEME_MODE_KEY, newMode);
        applyThemeMode(newMode);
      });

      const systemChangeHandler = () => {
        if (getSavedThemeMode() === "system") {
          applyThemeMode("system");
        }
      };

      if (typeof themeMedia.addEventListener === "function") {
        themeMedia.addEventListener("change", systemChangeHandler);
      } else if (typeof themeMedia.addListener === "function") {
        themeMedia.addListener(systemChangeHandler);
      }
    }

    function syncStickyOffsets() {
      const headerHeight = appHeader ? appHeader.offsetHeight : 0;
      document.documentElement.style.setProperty("--nav-top", `${headerHeight}px`);
    }

    function getGoogleMapsUrl(location) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
    }

    function getAppleMapsUrl(location) {
      return `https://maps.apple.com/?q=${encodeURIComponent(location)}`;
    }

    function renderTabs() {
      tabContainer.innerHTML = "";

      tripData.forEach((day, index) => {
        const isActive = index === currentDayIndex;
        const li = document.createElement("li");
        li.className = "flex-shrink-0";

        const button = document.createElement("button");
        button.type = "button";
        button.className = `day-tab px-5 py-2.5 rounded-2xl text-sm font-bold ${isActive ? "active" : "inactive"}`;
        button.innerHTML = `
          ${day.dayLabel}
          <span class="font-normal text-xs ml-1 opacity-90">${day.date}</span>
        `;
        button.addEventListener("click", () => changeDay(index));

        li.appendChild(button);
        tabContainer.appendChild(li);
      });
    }

    function renderItinerary(dayIndex) {
      itineraryContainer.innerHTML = "";
      const dayData = tripData[dayIndex];

      const titleEl = document.createElement("h2");
      titleEl.className = "text-lg font-black mb-2 pl-12 flex items-center gap-2";
      titleEl.style.color = "var(--header-bg)";
      titleEl.innerHTML = `
        <svg class="w-5 h-5 text-sakura-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        ${dayData.title}
      `;
      itineraryContainer.appendChild(titleEl);

      dayData.events.forEach((event, idx) => {
        const googleMapUrl = getGoogleMapsUrl(event.location);
        const appleMapUrl = getAppleMapsUrl(event.location);

        const card = document.createElement("div");
        card.className = "relative pl-12 opacity-0 translate-y-4";
        card.style.animation = `fadeInUp 0.4s ease forwards ${idx * 0.08}s`;

        const dotColor = idx === 0 ? "var(--accent)" : "var(--header-bg)";
        const ringStyle = idx === 0 ? "box-shadow: 0 0 0 4px var(--accent-soft);" : "";

        card.innerHTML = `
          <div
            class="absolute left-[17px] top-4 w-3.5 h-3.5 rounded-full border-[3px] border-white"
            style="background:${dotColor}; ${ringStyle}"
          ></div>

          <div class="surface-card rounded-2xl overflow-hidden">
            <div class="p-4 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
              <div class="time-pill flex-shrink-0 px-3 py-1.5 rounded-lg inline-block w-fit">
                <span class="font-bold text-lg tracking-wide" style="color: var(--accent);">
                  ${event.time}
                </span>
              </div>
              <h3 class="font-bold text-base leading-snug break-words flex-1" style="color: var(--text);">
                ${event.title}
              </h3>
            </div>

            <div class="event-actions flex">
              <a
                href="${googleMapUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="flex-1 py-3.5 text-center text-[13px] font-bold flex items-center justify-center gap-1.5"
                style="color: var(--header-bg);"
              >
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
                </svg>
                Google 地圖
              </a>

              <a
                href="${appleMapUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="flex-1 py-3.5 text-center text-[13px] font-bold flex items-center justify-center gap-1.5"
                style="color: var(--text-soft);"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                </svg>
                Apple 地圖
              </a>
            </div>
          </div>
        `;

        itineraryContainer.appendChild(card);
      });
    }

    function setWeatherLoading(text = "天氣讀取中...") {
      weatherEls.source.textContent = text;
      weatherEls.location.textContent = "--";
      weatherEls.summary.textContent = "--";
      weatherEls.icon.textContent = "⛅";
      weatherEls.temp.textContent = "--°";
      weatherEls.range.textContent = "-- / --";
    }

    function setWeatherError(text = "目前無法取得天氣") {
      weatherEls.source.textContent = text;
      weatherEls.location.textContent = "天氣載入失敗";
      weatherEls.summary.textContent = "請稍後再試";
      weatherEls.icon.textContent = "⚠️";
      weatherEls.temp.textContent = "--°";
      weatherEls.range.textContent = "-- / --";
    }

    function getWeatherLabel(code) {
      if (code === 0) return "晴朗";
      if ([1, 2, 3].includes(code)) return "多雲";
      if ([45, 48].includes(code)) return "有霧";
      if ([51, 53, 55, 56, 57].includes(code)) return "毛毛雨";
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "下雨";
      if ([71, 73, 75, 77].includes(code)) return "下雪";
      if ([85, 86].includes(code)) return "陣雪";
      if ([95, 96, 99].includes(code)) return "雷雨";
      return "天氣變化";
    }

    function getWeatherEmoji(code, isDay = 1) {
      if (code === 0) return isDay ? "☀️" : "🌙";
      if ([1, 2, 3].includes(code)) return isDay ? "⛅" : "☁️";
      if ([45, 48].includes(code)) return "🌫️";
      if ([51, 53, 55, 56, 57].includes(code)) return "🌦️";
      if ([61, 63, 65, 66, 67, 80, 81, 82].includes(code)) return "🌧️";
      if ([71, 73, 75, 77, 85, 86].includes(code)) return "❄️";
      if ([95, 96, 99].includes(code)) return "⛈️";
      return "🌤️";
    }

    function getTokyoMonthDay() {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "Asia/Tokyo",
        month: "numeric",
        day: "numeric"
      }).formatToParts(new Date());

      const month = parts.find((p) => p.type === "month")?.value;
      const day = parts.find((p) => p.type === "day")?.value;
      return `${month}/${day}`;
    }

    function monthDayToNumber(monthDay) {
      const [month, day] = monthDay.split("/").map(Number);
      return month * 100 + day;
    }

    async function geocodePlace(placeName) {
      if (geocodeCache.has(placeName)) {
        return geocodeCache.get(placeName);
      }

      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(placeName)}&count=1&language=zh&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Geocoding API failed");

      const data = await res.json();
      if (!data.results || !data.results.length) {
        throw new Error("No geocoding result");
      }

      const place = {
        latitude: data.results[0].latitude,
        longitude: data.results[0].longitude,
        name: data.results[0].name,
        admin1: data.results[0].admin1 || "",
        country: data.results[0].country || ""
      };

      geocodeCache.set(placeName, place);
      return place;
    }

    async function reverseGeocodeCoords(latitude, longitude) {
      const url =
        `https://nominatim.openstreetmap.org/reverse` +
        `?format=jsonv2` +
        `&lat=${latitude}` +
        `&lon=${longitude}` +
        `&zoom=14` +
        `&accept-language=zh-TW,zh,en`;

      const res = await fetch(url, {
        headers: {
          "Accept": "application/json"
        }
      });

      if (!res.ok) {
        throw new Error("Reverse geocoding failed");
      }

      const data = await res.json();
      const addr = data.address || {};

      return (
        data.name ||
        addr.attraction ||
        addr.building ||
        addr.neighbourhood ||
        addr.suburb ||
        addr.city_district ||
        addr.town ||
        addr.city ||
        addr.county ||
        (data.display_name ? data.display_name.split(",")[0] : "目前位置")
      );
    }

    async function fetchWeatherByCoords(latitude, longitude) {
      const url =
        `https://api.open-meteo.com/v1/forecast` +
        `?latitude=${latitude}` +
        `&longitude=${longitude}` +
        `&current=temperature_2m,weather_code,is_day` +
        `&daily=temperature_2m_max,temperature_2m_min` +
        `&forecast_days=1` +
        `&timezone=auto`;

      const res = await fetch(url);
      if (!res.ok) throw new Error("Weather API failed");
      return res.json();
    }

    function renderWeatherCard({ sourceText, locationName, weather }) {
      const current = weather.current || {};
      const daily = weather.daily || {};
      const temp = Math.round(current.temperature_2m ?? 0);
      const max = Math.round((daily.temperature_2m_max || [])[0] ?? 0);
      const min = Math.round((daily.temperature_2m_min || [])[0] ?? 0);
      const code = current.weather_code ?? 1;
      const isDay = current.is_day ?? 1;

      weatherEls.source.textContent = sourceText;
      weatherEls.location.textContent = locationName;
      weatherEls.summary.textContent = `${getWeatherLabel(code)} · 今日高 ${max}° / 低 ${min}°`;
      weatherEls.icon.textContent = getWeatherEmoji(code, isDay);
      weatherEls.temp.textContent = `${temp}°`;
      weatherEls.range.textContent = `${max}° / ${min}°`;
    }

    function getCurrentPositionAsync(options = {}) {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject(new Error("Geolocation not supported"));
          return;
        }

        navigator.geolocation.getCurrentPosition(resolve, reject, options);
      });
    }

    function getFallbackDayData() {
      const todayValue = monthDayToNumber(getTokyoMonthDay());

      const exactDay = tripData.find((day) => monthDayToNumber(day.date) === todayValue);
      if (exactDay) {
        return {
          dayData: exactDay,
          isExactToday: true
        };
      }

      const pastDays = [...tripData]
        .filter((day) => monthDayToNumber(day.date) <= todayValue)
        .sort((a, b) => monthDayToNumber(b.date) - monthDayToNumber(a.date));

      if (pastDays.length) {
        return {
          dayData: pastDays[0],
          isExactToday: false
        };
      }

      return {
        dayData: tripData[0],
        isExactToday: false
      };
    }

    function getTodayFallbackDestination() {
      const { dayData, isExactToday } = getFallbackDayData();
      const lastEvent = dayData.events[dayData.events.length - 1];

      return {
        sourceText: isExactToday ? "今日最後目的地天氣" : "最近行程目的地天氣",
        locationName: lastEvent.title || lastEvent.location,
        query: lastEvent.weatherQuery || lastEvent.location
      };
    }

    async function refreshHeaderWeather() {
      setWeatherLoading();

      try {
        const pos = await getCurrentPositionAsync({
          enableHighAccuracy: false,
          timeout: 5000,
          maximumAge: 10 * 60 * 1000
        });

        const latitude = pos.coords.latitude;
        const longitude = pos.coords.longitude;

        const [weather, placeName] = await Promise.all([
          fetchWeatherByCoords(latitude, longitude),
          reverseGeocodeCoords(latitude, longitude).catch(() => "目前位置")
        ]);

        renderWeatherCard({
          sourceText: "目前位置天氣",
          locationName: placeName,
          weather
        });
        return;
      } catch (e) {
        // 抓不到定位時改用今天最後目的地
      }

      try {
        const fallback = getTodayFallbackDestination();
        const geo = await geocodePlace(fallback.query);
        const weather = await fetchWeatherByCoords(geo.latitude, geo.longitude);

        renderWeatherCard({
          sourceText: fallback.sourceText,
          locationName: fallback.locationName,
          weather
        });
      } catch (e) {
        console.error(e);
        setWeatherError("目前無法取得天氣");
      }
    }

    function changeDay(index) {
      currentDayIndex = index;
      renderTabs();
      renderItinerary(index);

      const tabEl = tabContainer.children[index];
      if (tabEl) {
        tabEl.scrollIntoView({
          behavior: "smooth",
          block: "nearest",
          inline: "center"
        });
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function openGmailApp() {
      const ua = navigator.userAgent || "";
      const isIOS =
        /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      if (isIOS) {
        window.location.href = "googlegmail://";
        return;
      }

      if (isAndroid) {
        window.location.href = "intent://mail.google.com/#Intent;scheme=https;package=com.google.android.gm;end";
        return;
      }

      window.open("https://mail.google.com/mail/u/0/#inbox", "_blank", "noopener,noreferrer");
    }

    function initApp() {
      initTheme();
      renderTabs();
      renderItinerary(currentDayIndex);
      refreshHeaderWeather();
      syncStickyOffsets();

      gmailBtn.addEventListener("click", openGmailApp);

      window.addEventListener("resize", syncStickyOffsets);
      window.addEventListener("orientationchange", syncStickyOffsets);

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") {
          refreshHeaderWeather();
        }
      });

      setInterval(refreshHeaderWeather, 10 * 60 * 1000);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(syncStickyOffsets).catch(() => {});
      }

      requestAnimationFrame(syncStickyOffsets);
      setTimeout(syncStickyOffsets, 120);
    }

    initApp();
  </script>

  <script>
    (function generateAppIcon() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");
      if (!ctx) return;

      ctx.fillStyle = "#f8f9fa";
      ctx.fillRect(0, 0, 512, 512);

      ctx.fillStyle = "#ffb7c5";
      ctx.beginPath();
      ctx.arc(256, 220, 110, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#3776ab";
      ctx.beginPath();
      ctx.moveTo(60, 430);
      ctx.lineTo(256, 140);
      ctx.lineTo(452, 430);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(256, 140);
      ctx.lineTo(312, 220);
      ctx.lineTo(280, 240);
      ctx.lineTo(256, 200);
      ctx.lineTo(220, 240);
      ctx.lineTo(200, 220);
      ctx.closePath();
      ctx.fill();

      const iconDataUrl = canvas.toDataURL("image/png");

      const appleIcon = document.createElement("link");
      appleIcon.rel = "apple-touch-icon";
      appleIcon.href = iconDataUrl;
      document.head.appendChild(appleIcon);

      const favicon = document.createElement("link");
      favicon.rel = "icon";
      favicon.type = "image/png";
      favicon.href = iconDataUrl;
      document.head.appendChild(favicon);
    })();
  </script>
