<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>春日山海之旅</title>

  <!-- 支援亮/暗色系 -->
  <meta name="color-scheme" content="light dark" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="生日旅行" />
  <meta name="theme-color" id="theme-color-meta" content="#3776ab" />

  <!-- 避免初始載入閃白/閃黑 -->
  <script>
    (function () {
      const THEME_KEY = "theme-preference";
      const saved = localStorage.getItem(THEME_KEY) || "system";
      const prefersDark =
        window.matchMedia &&
        window.matchMedia("(prefers-color-scheme: dark)").matches;

      const resolved = saved === "system" ? (prefersDark ? "dark" : "light") : saved;
      document.documentElement.setAttribute("data-theme", resolved);
      document.documentElement.setAttribute("data-theme-preference", saved);
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            fuji: { 500: "#3776ab", 600: "#2c5e8a" },
            sakura: { 50: "#fff5f7", 100: "#ffe4e1", 500: "#ffb7c5" }
          }
        }
      }
    };
  </script>

  <style>
    :root {
      color-scheme: light dark;
      --bg: #f3f4f6;
      --surface: #fafafa;
      --surface-2: #ffffff;
      --surface-3: #f9fafb;
      --text: #111827;
      --text-soft: #6b7280;
      --border: #e5e7eb;
      --line: #e5e7eb;
      --header-bg: #3776ab;
      --header-text: #ffffff;
      --accent: #ffb7c5;
      --accent-soft: #fff5f7;
      --accent-border: #ffe4e1;
      --shadow: 0 0 25px rgba(0, 0, 0, 0.10);
      --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.06);
      --nav-top: 0px;
      --theme-btn-bg: rgba(255, 255, 255, 0.12);
      --theme-btn-hover: rgba(255, 255, 255, 0.20);
    }

    html[data-theme="dark"] {
      --bg: #0f172a;
      --surface: #111827;
      --surface-2: #1f2937;
      --surface-3: #111827;
      --text: #f3f4f6;
      --text-soft: #9ca3af;
      --border: #374151;
      --line: #334155;
      --header-bg: #1e3a5f;
      --header-text: #f9fafb;
      --accent: #f49bb1;
      --accent-soft: rgba(244, 155, 177, 0.12);
      --accent-border: rgba(244, 155, 177, 0.18);
      --shadow: 0 0 25px rgba(0, 0, 0, 0.32);
      --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.28);
      --theme-btn-bg: rgba(255, 255, 255, 0.08);
      --theme-btn-hover: rgba(255, 255, 255, 0.14);
    }

    html.dark {
      color-scheme: dark;
    }

    html.light {
      color-scheme: light;
    }

    body {
      margin: 0;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .app-container {
      max-width: 100%;
      min-height: 100vh;
      background-color: var(--surface);
      display: flex;
      flex-direction: column;
      margin: 0 auto;
      transition: background-color 0.25s ease;
    }

    @media (min-width: 640px) {
      .app-container {
        max-width: 500px;
        box-shadow: var(--shadow);
      }
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .timeline-line {
      position: absolute;
      left: 1.5rem;
      top: 2rem;
      bottom: 0;
      width: 2px;
      background-color: var(--line);
      z-index: 0;
      transition: background-color 0.25s ease;
    }

    .header-shell {
      background-color: var(--header-bg);
      color: var(--header-text);
      transition: background-color 0.25s ease, color 0.25s ease;
    }

    .surface-card {
      background-color: var(--surface-2);
      border: 1px solid var(--border);
      box-shadow: var(--card-shadow);
      transition:
        background-color 0.25s ease,
        border-color 0.25s ease,
        box-shadow 0.25s ease;
    }

    .subtle-surface {
      background-color: var(--surface-3);
      transition: background-color 0.25s ease;
    }

    .text-soft {
      color: var(--text-soft);
    }

    .theme-chip {
      background: var(--theme-btn-bg);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      transition: background-color 0.2s ease, transform 0.2s ease, opacity 0.2s ease;
    }

    .theme-chip:hover {
      background: var(--theme-btn-hover);
    }

    .theme-chip:active {
      transform: scale(0.98);
    }

    .top-nav {
      position: sticky;
      top: var(--nav-top);
      z-index: 20;
      background-color: var(--surface-2);
      border-bottom: 1px solid var(--border);
      transition: background-color 0.25s ease, border-color 0.25s ease, top 0.2s ease;
    }

    .quick-link {
      background: rgba(255, 255, 255, 0.10);
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .quick-link:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .quick-link:active {
      transform: scale(0.98);
    }

    .primary-white-btn {
      background-color: #fff;
      color: #2c5e8a;
      transition: background-color 0.2s ease, transform 0.2s ease;
    }

    .primary-white-btn:hover {
      background-color: #f3f4f6;
    }

    .primary-white-btn:active {
      transform: scale(0.995);
    }

    .day-tab {
      transition: all 0.25s ease;
    }

    .day-tab.active {
      background-color: var(--accent);
      color: #fff;
      border-color: transparent;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      transform: scale(1.04);
    }

    .day-tab.inactive {
      background-color: var(--surface-2);
      color: var(--text-soft);
      border: 1px solid var(--border);
    }

    .day-tab.inactive:hover {
      background-color: var(--accent-soft);
      border-color: var(--accent-border);
    }

    .time-pill {
      background-color: var(--accent-soft);
      border: 1px solid var(--accent-border);
    }

    .event-actions {
      border-top: 1px solid var(--border);
      background-color: color-mix(in srgb, var(--surface-3) 85%, transparent);
    }

    .event-actions a + a {
      border-left: 1px solid var(--border);
    }

    .theme-mode-badge {
      font-size: 11px;
      opacity: 0.92;
      letter-spacing: 0.02em;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header id="app-header" class="header-shell px-5 py-6 sticky top-0 z-30 shadow-md">
      <div class="flex items-start justify-between gap-3 mb-4">
        <h1 class="text-xl font-bold tracking-wide flex items-center gap-2 leading-tight">
          <svg class="w-6 h-6 text-sakura-500 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 2.25c-5.385 0-9.75 4.365-9.75 9.75s4.365 9.75 9.75 9.75 9.75-4.365 9.75-9.75S17.385 2.25 12 2.25zM12 10.5a1.5 1.5 0 110-3 1.5 1.5 0 010 3zm4.5 5.25a.75.75 0 01-.75.75H8.25a.75.75 0 010-1.5h7.5a.75.75 0 01.75.75z"/>
          </svg>
          <span>春日山海之旅</span>
        </h1>

        <div class="flex flex-col items-end gap-2">
          <div class="flex items-center gap-2">
            <button
              id="theme-toggle-btn"
              type="button"
              class="theme-chip inline-flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold"
              aria-label="切換亮色或暗色主題"
            >
              <span id="theme-toggle-icon" aria-hidden="true">🌙</span>
              <span id="theme-toggle-text">切換主題</span>
            </button>

            <button
              id="theme-system-btn"
              type="button"
              class="theme-chip inline-flex items-center gap-2 px-3 py-2 rounded-xl text-xs font-semibold"
              aria-label="恢復為跟隨系統主題"
            >
              <span aria-hidden="true">🌓</span>
              <span>跟隨系統</span>
            </button>
          </div>

          <div id="theme-mode-badge" class="theme-mode-badge text-white/90">
            目前：跟隨系統
          </div>
        </div>
      </div>

      <div class="grid grid-cols-4 gap-3 mb-4">
        <button
          type="button"
          id="gmail-app-btn"
          class="quick-link flex flex-col items-center gap-1 p-2 rounded-xl"
          aria-label="開啟 Gmail App"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
          </svg>
          <span class="text-[11px] font-medium">Gmail</span>
        </button>

        <a
          href="https://www.booking.com"
          target="_blank"
          rel="noopener noreferrer"
          class="quick-link flex flex-col items-center gap-1 p-2 rounded-xl"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path>
          </svg>
          <span class="text-[11px] font-medium">Booking</span>
        </a>

        <a
          href="https://www.trip.com"
          target="_blank"
          rel="noopener noreferrer"
          class="quick-link flex flex-col items-center gap-1 p-2 rounded-xl"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span class="text-[11px] font-medium">Trip.com</span>
        </a>

        <a
          href="https://www.kkday.com"
          target="_blank"
          rel="noopener noreferrer"
          class="quick-link flex flex-col items-center gap-1 p-2 rounded-xl"
        >
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
          </svg>
          <span class="text-[11px] font-medium">KKday</span>
        </a>
      </div>

      <a
        href="https://tenki.jp/"
        target="_blank"
        rel="noopener noreferrer"
        class="primary-white-btn inline-flex items-center justify-center w-full py-2.5 rounded-xl text-sm font-bold shadow-sm"
      >
        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path>
        </svg>
        查看日本天氣 (tenki.jp)
      </a>
    </header>

    <nav class="top-nav">
      <ul id="tab-container" class="flex overflow-x-auto hide-scrollbar py-3 px-3 gap-3"></ul>
    </nav>

    <main class="flex-1 p-5 relative overflow-hidden">
      <div class="timeline-line"></div>
      <div id="itinerary-container" class="relative z-10 flex flex-col gap-6"></div>
    </main>
  </div>

  <script>
    // 行程資料
    const tripData = [
      {
        dayLabel: "Day 1",
        date: "3/21",
        title: "抵達千葉",
        events: [
          { time: "14:20", title: "抵達成田機場 (星宇 JX802)", location: "成田國際機場" },
          { time: "17:00", title: "三井花園飯店柏之葉", location: "三井花園飯店柏之葉" },
          { time: "19:00", title: "焼肉 こう舟", location: "焼肉 こう舟" }
        ]
      },
      {
        dayLabel: "Day 2",
        date: "3/22",
        title: "富士山自駕",
        events: [
          { time: "10:30", title: "新宿站 (搭乘富士回遊號)", location: "新宿站" },
          { time: "12:45", title: "河口湖車站 (取車)", location: "河口湖車站" },
          { time: "13:15", title: "不動茶屋 東戀路店", location: "ほうとう不動 東恋路店" },
          { time: "14:30", title: "大石公園 & 西湖療癒之里根場", location: "大石公園" },
          { time: "18:00", title: "山中湖聖丹斯度假村", location: "山中湖聖丹斯度假村" }
        ]
      },
      {
        dayLabel: "Day 3",
        date: "3/23",
        title: "三島還車與熱海",
        events: [
          { time: "08:30", title: "長池親水公園", location: "長池親水公園" },
          { time: "11:00", title: "三島車站 (還車)", location: "三島車站" },
          { time: "12:30", title: "MOA 美術館", location: "MOA 美術館" },
          { time: "15:30", title: "LA VISTA 熱海露台", location: "ラビスタ観音崎テラス" }
        ]
      },
      {
        dayLabel: "Day 4",
        date: "3/24",
        title: "觀光列車與東京",
        events: [
          { time: "10:30", title: "熱海陽光沙灘", location: "熱海陽光沙灘" },
          { time: "15:31", title: "藍寶石踊子號 (熱海站)", location: "熱海站" },
          { time: "17:30", title: "FAV TOKYO NISHINIPPORI", location: "FAV TOKYO NISHINIPPORI" },
          { time: "19:00", title: "千鳥之淵 或 目黑川", location: "千鳥之淵" }
        ]
      },
      {
        dayLabel: "Day 5",
        date: "3/25",
        title: "早櫻與返台",
        events: [
          { time: "09:30", title: "新宿御苑 或 上野恩賜公園", location: "新宿御苑" },
          { time: "12:00", title: "阿美橫丁", location: "阿美橫丁" },
          { time: "15:00", title: "日暮里站 (搭乘 Keisei Skyliner)", location: "日暮里站" },
          { time: "18:00", title: "成田機場 (日航 JL809)", location: "成田國際機場" }
        ]
      }
    ];

    let currentDayIndex = 0;

    const THEME_KEY = "theme-preference";
    const themeMedia = window.matchMedia("(prefers-color-scheme: dark)");
    const tabContainer = document.getElementById("tab-container");
    const itineraryContainer = document.getElementById("itinerary-container");
    const themeToggleBtn = document.getElementById("theme-toggle-btn");
    const themeSystemBtn = document.getElementById("theme-system-btn");
    const themeToggleText = document.getElementById("theme-toggle-text");
    const themeToggleIcon = document.getElementById("theme-toggle-icon");
    const themeModeBadge = document.getElementById("theme-mode-badge");
    const themeColorMeta = document.getElementById("theme-color-meta");
    const gmailBtn = document.getElementById("gmail-app-btn");
    const appHeader = document.getElementById("app-header");

    function getSavedThemePreference() {
      return localStorage.getItem(THEME_KEY) || "system";
    }

    function resolveTheme(preference) {
      if (preference === "system") {
        return themeMedia.matches ? "dark" : "light";
      }
      return preference;
    }

    function updateThemeColorMeta(resolvedTheme) {
      const color = resolvedTheme === "dark" ? "#1e3a5f" : "#3776ab";
      themeColorMeta.setAttribute("content", color);
    }

    function updateThemeUI(preference, resolvedTheme) {
      document.documentElement.setAttribute("data-theme", resolvedTheme);
      document.documentElement.setAttribute("data-theme-preference", preference);
      document.documentElement.classList.toggle("dark", resolvedTheme === "dark");
      document.documentElement.classList.toggle("light", resolvedTheme === "light");

      if (resolvedTheme === "dark") {
        themeToggleIcon.textContent = "☀️";
        themeToggleText.textContent = "切到亮色";
      } else {
        themeToggleIcon.textContent = "🌙";
        themeToggleText.textContent = "切到暗色";
      }

      themeModeBadge.textContent =
        preference === "system"
          ? `目前：跟隨系統（${resolvedTheme === "dark" ? "暗色" : "亮色"}）`
          : `目前：手動${resolvedTheme === "dark" ? "暗色" : "亮色"}`;

      updateThemeColorMeta(resolvedTheme);
    }

    function applyTheme(preference) {
      const resolvedTheme = resolveTheme(preference);
      updateThemeUI(preference, resolvedTheme);
      renderTabs();
      renderItinerary(currentDayIndex);
    }

    function toggleThemeManually() {
      const currentPreference = getSavedThemePreference();
      const currentResolved = resolveTheme(currentPreference);
      const nextTheme = currentResolved === "dark" ? "light" : "dark";
      localStorage.setItem(THEME_KEY, nextTheme);
      applyTheme(nextTheme);
    }

    function resetThemeToSystem() {
      localStorage.setItem(THEME_KEY, "system");
      applyTheme("system");
    }

    function listenSystemThemeChange() {
      const handler = () => {
        if (getSavedThemePreference() === "system") {
          applyTheme("system");
        }
      };

      if (typeof themeMedia.addEventListener === "function") {
        themeMedia.addEventListener("change", handler);
      } else if (typeof themeMedia.addListener === "function") {
        themeMedia.addListener(handler);
      }
    }

    function syncStickyOffsets() {
      const headerHeight = appHeader ? appHeader.offsetHeight : 0;
      document.documentElement.style.setProperty("--nav-top", `${headerHeight}px`);
    }

    function getGoogleMapsUrl(location) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
    }

    function getAppleMapsUrl(location) {
      return `https://maps.apple.com/?q=${encodeURIComponent(location)}`;
    }

    function renderTabs() {
      tabContainer.innerHTML = "";

      tripData.forEach((day, index) => {
        const isActive = index === currentDayIndex;
        const li = document.createElement("li");
        li.className = "flex-shrink-0";

        const button = document.createElement("button");
        button.type = "button";
        button.className = `day-tab px-5 py-2.5 rounded-2xl text-sm font-bold ${isActive ? "active" : "inactive"}`;
        button.innerHTML = `
          ${day.dayLabel}
          <span class="font-normal text-xs ml-1 opacity-90">${day.date}</span>
        `;
        button.addEventListener("click", () => changeDay(index));

        li.appendChild(button);
        tabContainer.appendChild(li);
      });
    }

    function renderItinerary(dayIndex) {
      itineraryContainer.innerHTML = "";
      const dayData = tripData[dayIndex];

      const titleEl = document.createElement("h2");
      titleEl.className = "text-lg font-black mb-2 pl-12 flex items-center gap-2";
      titleEl.style.color = "var(--header-bg)";
      titleEl.innerHTML = `
        <svg class="w-5 h-5 text-sakura-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        ${dayData.title}
      `;
      itineraryContainer.appendChild(titleEl);

      dayData.events.forEach((event, idx) => {
        const googleMapUrl = getGoogleMapsUrl(event.location);
        const appleMapUrl = getAppleMapsUrl(event.location);

        const card = document.createElement("div");
        card.className = "relative pl-12 opacity-0 translate-y-4";
        card.style.animation = `fadeInUp 0.4s ease forwards ${idx * 0.08}s`;

        const dotColor = idx === 0 ? "var(--accent)" : "var(--header-bg)";
        const ringStyle =
          idx === 0 ? "box-shadow: 0 0 0 4px var(--accent-soft);" : "";

        card.innerHTML = `
          <div
            class="absolute left-[17px] top-4 w-3.5 h-3.5 rounded-full border-[3px] border-white"
            style="background:${dotColor}; ${ringStyle}"
          ></div>

          <div class="surface-card rounded-2xl overflow-hidden">
            <div class="p-4 flex flex-col sm:flex-row sm:items-center gap-2 sm:gap-4">
              <div class="time-pill flex-shrink-0 px-3 py-1.5 rounded-lg inline-block w-fit">
                <span class="font-bold text-lg tracking-wide" style="color: var(--accent);">
                  ${event.time}
                </span>
              </div>
              <h3 class="font-bold text-base leading-snug break-words flex-1" style="color: var(--text);">
                ${event.title}
              </h3>
            </div>

            <div class="event-actions flex">
              <a
                href="${googleMapUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="flex-1 py-3.5 text-center text-[13px] font-bold flex items-center justify-center gap-1.5"
                style="color: var(--header-bg);"
              >
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 010-5 2.5 2.5 0 010 5z"/>
                </svg>
                Google 地圖
              </a>

              <a
                href="${appleMapUrl}"
                target="_blank"
                rel="noopener noreferrer"
                class="flex-1 py-3.5 text-center text-[13px] font-bold flex items-center justify-center gap-1.5"
                style="color: var(--text-soft);"
              >
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"></path>
                </svg>
                Apple 地圖
              </a>
            </div>
          </div>
        `;

        itineraryContainer.appendChild(card);
      });
    }

    function changeDay(index) {
      currentDayIndex = index;
      renderTabs();
      renderItinerary(index);

      const tabEl = tabContainer.children[index];
      if (tabEl) {
        tabEl.scrollIntoView({
          behavior: "smooth",
          block: "nearest",
          inline: "center"
        });
      }

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // Gmail App：iOS 先嘗試 app scheme，失敗再 fallback 到網頁
    function openUrlWithFallback(appUrl, webUrl, timeout = 900) {
      let pageHidden = false;

      const onHide = () => {
        pageHidden = true;
        cleanup();
      };

      const cleanup = () => {
        document.removeEventListener("visibilitychange", handleVisibility);
        window.removeEventListener("pagehide", onHide);
      };

      const handleVisibility = () => {
        if (document.visibilityState === "hidden") {
          onHide();
        }
      };

      document.addEventListener("visibilitychange", handleVisibility);
      window.addEventListener("pagehide", onHide);

      setTimeout(() => {
        cleanup();
        if (!pageHidden) {
          window.location.href = webUrl;
        }
      }, timeout);

      window.location.href = appUrl;
    }

    function openGmailApp() {
      const ua = navigator.userAgent || "";
      const isIOS =
        /iPad|iPhone|iPod/.test(ua) ||
        (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
      const isAndroid = /Android/i.test(ua);

      const gmailWebInbox = "https://mail.google.com/mail/u/0/#inbox";

      if (isIOS) {
        // iOS Gmail App 自訂 scheme
        openUrlWithFallback("googlegmail://", gmailWebInbox);
        return;
      }

      if (isAndroid) {
        // Android 用 intent 先嘗試 Gmail App，再退回 web
        openUrlWithFallback(
          "intent://mail.google.com/#Intent;scheme=https;package=com.google.android.gm;end",
          gmailWebInbox
        );
        return;
      }

      window.open(gmailWebInbox, "_blank", "noopener,noreferrer");
    }

    function initTheme() {
      applyTheme(getSavedThemePreference());
      listenSystemThemeChange();

      themeToggleBtn.addEventListener("click", toggleThemeManually);
      themeSystemBtn.addEventListener("click", resetThemeToSystem);
    }

    function initApp() {
      initTheme();
      renderTabs();
      renderItinerary(currentDayIndex);
      syncStickyOffsets();

      gmailBtn.addEventListener("click", openGmailApp);

      window.addEventListener("resize", syncStickyOffsets);
      window.addEventListener("orientationchange", syncStickyOffsets);

      if (document.fonts && document.fonts.ready) {
        document.fonts.ready.then(syncStickyOffsets).catch(() => {});
      }

      requestAnimationFrame(syncStickyOffsets);
      setTimeout(syncStickyOffsets, 120);
    }

    initApp();
  </script>

  <script>
    // 你原本的動態 icon 先保留
    (function generateAppIcon() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      if (!ctx) return;

      ctx.fillStyle = "#f8f9fa";
      ctx.fillRect(0, 0, 512, 512);

      ctx.fillStyle = "#ffb7c5";
      ctx.beginPath();
      ctx.arc(256, 220, 110, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "#3776ab";
      ctx.beginPath();
      ctx.moveTo(60, 430);
      ctx.lineTo(256, 140);
      ctx.lineTo(452, 430);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.moveTo(256, 140);
      ctx.lineTo(312, 220);
      ctx.lineTo(280, 240);
      ctx.lineTo(256, 200);
      ctx.lineTo(220, 240);
      ctx.lineTo(200, 220);
      ctx.closePath();
      ctx.fill();

      const iconDataUrl = canvas.toDataURL("image/png");

      const appleIcon = document.createElement("link");
      appleIcon.rel = "apple-touch-icon";
      appleIcon.href = iconDataUrl;
      document.head.appendChild(appleIcon);

      const favicon = document.createElement("link");
      favicon.rel = "icon";
      favicon.type = "image/png";
      favicon.href = iconDataUrl;
      document.head.appendChild(favicon);
    })();
  </script>
